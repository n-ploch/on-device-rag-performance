server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api requests to the orchestrator API service
    location /api/ {
        proxy_pass http://orchestrator-api:8080;
        proxy_http_version 1.1;
        # Required for SSE streaming
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # SPA fallback: route all non-asset requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
