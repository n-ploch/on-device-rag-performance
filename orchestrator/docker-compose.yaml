services:
  orchestrator:
    build:
      context: ..
      dockerfile: orchestrator/Dockerfile
    environment:
      - WORKER_URL=http://host.docker.internal:8000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-https://localhost:3000}
      - LOCAL_MODELS_DIR=/models
      - LOCAL_COLLECTIONS_DIR=/collections
      - LOCAL_DATASETS_DIR=/datasets
    volumes:
      - ../config:/app/config:ro
      - ./logs:/app/logs
      - ${LOCAL_MODELS_DIR:-../local/models}:/models:ro
      - ${LOCAL_COLLECTIONS_DIR:-../local/collections}:/collections
      - ${LOCAL_DATASETS_DIR:-../local/datasets}:/datasets:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
