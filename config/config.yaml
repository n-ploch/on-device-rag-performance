# RAG Evaluation Configuration
# See README.md for full documentation

dataset:
  id: "scifact_bigbio"
  source: "bigbio/scifact"
  # Storage path: $LOCAL_DATASETS_DIR/{id}/ (env var defaults to ./local/datasets)
  limits:
    corpus: null  # Limit corpus documents (null for all)
    ground_truth: null  # Limit ground truth samples (null for all)

observability:
  langfuse: false  # Set to true for Langfuse cloud, false for local JSONL
  output_jsonl: "./logs/traces.jsonl"

run_configs:
  - run_id: "mistral_q4_baseline_001"
    retrieval:
      model: "keisuke-miyako/multilingual-e5-small-gguf-q4_k_m"
      quantization: "q4_k_m"
      dimensions: 384
      chunking:
        strategy: "fixed"
        chunk_size: 500
        chunk_overlap: 64
      k: 3
    generation:
      model: "TheBloke/Llama-2-7B-Chat-GGUF"
      quantization: "q4_k_m"
