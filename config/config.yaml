# RAG Evaluation Configuration
# See README.md for full documentation

dataset:
  id: &dataset_id "ragbench_emanual"
  name: "ragbench"
  limits:
    corpus: null
    ground_truth: null

observability:
  langfuse: false  # Set to true for Langfuse cloud, false for local JSONL
  output_jsonl: "./logs/traces.jsonl"
  sys_logs_path: "./logs/runner.log"  # Path to write Python logs (null for no file logging, e.g., "./logs/runner.log")
  print_logs: true  # Whether to print logs to terminal

run_configs:
  - run_id: "mistral_q4_baseline_001"
    retrieval:
      dataset_id: *dataset_id
      model: "keisuke-miyako/multilingual-e5-small-gguf-q4_k_m"
      quantization: "q4_k_m"
      dimensions: 384
      chunking:
        strategy: "fixed"
        chunk_size: 500
        chunk_overlap: 64
      k: 3
    generation:
      model: "mistralai/Ministral-3-3B-Instruct-2512-GGUF"
      quantization: "q4_k_m"
